# docker-compose.yml — uso LOCAL para desenvolvimento e testes
# Em produção, o PostgreSQL é gerenciado pelo Coolify (rede interna)
#
# Uso:
#   docker compose up -d
#   curl -X POST http://localhost:3000/shorten -H "Content-Type: application/json" -d '{"url":"https://github.com"}'

services:
  shortener-api:
    container_name: shortener-api
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://shortener-user:shortener-user@shortener-db:5432/shortener
      BASE_URL: http://localhost:3000
      NODE_ENV: development
    depends_on:
      shortener-db:
        condition: service_healthy
    restart: unless-stopped

  shortener-db:
    container_name: shortener-db
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: shortener-user
      POSTGRES_PASSWORD: shortener-user
      POSTGRES_DB: shortener
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # IMPORTANTE: sem ports expostos aqui.
    # O banco só é acessível internamente pela rede Docker.
    # Em produção no Coolify, o mesmo princípio se aplica.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shortener-user -d shortener"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

# Rede padrão isolada — containers só se falam internamente
networks:
  default:
    name: vpslab-shortener
