<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80">
  <defs>
    <style>
      .wordmark { font-family: 'JetBrains Mono', 'Fira Code', 'Courier New', monospace; }
    </style>
  </defs>

  <!-- Stack de servidores -->

  <!-- camada 3 (base) -->
  <rect x="6" y="52" width="58" height="14" rx="3" fill="none" stroke="#475569" stroke-width="1.2" opacity="0.5"/>
  <circle cx="55" cy="59" r="2.5" fill="#475569" opacity="0.3"/>
  <rect x="12" y="56" width="12" height="2" rx="1" fill="#475569" opacity="0.25"/>
  <rect x="26" y="56" width="8" height="2" rx="1" fill="#475569" opacity="0.2"/>

  <!-- camada 2 (meio) -->
  <rect x="3" y="30" width="58" height="14" rx="3" fill="none" stroke="#64748b" stroke-width="1.3" opacity="0.7"/>
  <circle cx="52" cy="37" r="2.5" fill="#3b82f6" opacity="0.6"/>
  <rect x="10" y="34" width="16" height="2" rx="1" fill="#64748b" opacity="0.3"/>
  <rect x="28" y="34" width="10" height="2" rx="1" fill="#64748b" opacity="0.25"/>

  <!-- camada 1 (topo, destaque) -->
  <rect x="0" y="8" width="58" height="14" rx="3" fill="none" stroke="#f1f5f9" stroke-width="1.8"/>
  <circle cx="49" cy="15" r="3" fill="#3b82f6"/>
  <circle cx="49" cy="15" r="6" fill="#3b82f6" opacity="0.2"/>
  <rect x="8" y="12" width="20" height="2.5" rx="1.2" fill="#94a3b8" opacity="0.5"/>
  <rect x="30" y="12" width="12" height="2.5" rx="1.2" fill="#94a3b8" opacity="0.3"/>

  <!-- Wordmark -->
  <text x="76" y="38" class="wordmark" font-size="38" font-weight="500" letter-spacing="-1.5" fill="#f1f5f9">vps-lab</text>
  <text x="78" y="56" class="wordmark" font-size="11" fill="#3b82f6" letter-spacing="2.5">we ♥ self-hosted</text>
</svg>
