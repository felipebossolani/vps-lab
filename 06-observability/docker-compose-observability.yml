# docker-compose-observability.yml
# Stack de observabilidade completa — para deploy via Coolify (Stack / Docker Compose)
#
# Serviços:
#   - Grafana        → dashboards (grafana.vpslab.com.br)
#   - Prometheus     → coleta de métricas
#   - Loki           → coleta de logs
#   - Promtail       → agente que envia logs do Docker para o Loki
#   - Uptime Kuma    → status page pública (status.vpslab.com.br)
#   - Node Exporter  → métricas do host (CPU, memória, disco)
#
# No Coolify: Projects → New Stack → colar esse arquivo

services:

  # ── Grafana — Dashboards ────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:?Defina GRAFANA_PASSWORD}
      GF_SERVER_DOMAIN: grafana.vpslab.com.br
      GF_SERVER_ROOT_URL: https://grafana.vpslab.com.br
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - monitoring
    # Coolify vai gerenciar o domínio e SSL via label do Traefik
    labels:
      - "coolify.managed=true"

  # ── Prometheus — Métricas ───────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - monitoring

  # ── Loki — Logs ────────────────────────────────────────────────────────────
  loki:
    image: grafana/loki:latest
    container_name: loki
    restart: unless-stopped
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - loki_data:/loki
    networks:
      - monitoring

  # ── Promtail — Agente de logs Docker → Loki ─────────────────────────────────
  promtail:
    image: grafana/promtail:latest
    container_name: promtail
    restart: unless-stopped
    volumes:
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ./promtail-config.yml:/etc/promtail/config.yml:ro
    command: -config.file=/etc/promtail/config.yml
    networks:
      - monitoring
    depends_on:
      - loki

  # ── Node Exporter — Métricas do host ────────────────────────────────────────
  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    restart: unless-stopped
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    networks:
      - monitoring

  # ── Uptime Kuma — Status page pública ───────────────────────────────────────
  uptime-kuma:
    image: louislam/uptime-kuma:latest
    container_name: uptime-kuma
    restart: unless-stopped
    volumes:
      - uptime_kuma_data:/app/data
    networks:
      - monitoring
    labels:
      - "coolify.managed=true"

volumes:
  grafana_data:
  prometheus_data:
  loki_data:
  uptime_kuma_data:

networks:
  monitoring:
    name: vpslab-monitoring
