# docker-compose.yml — Umami Analytics
# Deploy via Coolify (Docker Compose + GitHub)
#
# O banco PostgreSQL é criado separadamente no Coolify (mesmo padrão EP05).
# A connection string interna do Coolify é passada via DATABASE_URL.
#
# No Coolify: Projects → New → Docker Compose → GitHub
#   Base Directory: /08-analytics
#   Docker Compose Location: docker-compose.yml
#
# Para desenvolvimento local, use docker-compose.local.yml

services:
  umami:
    image: ghcr.io/umami-software/umami:postgresql-latest
    container_name: umami
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:?Defina DATABASE_URL com a connection string interna do Coolify}
      APP_SECRET: ${APP_SECRET:?Defina APP_SECRET com uma string aleatória}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/heartbeat || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

networks:
  default:
    name: vpslab-analytics
